
# This file is automatically generated. Manual edits will be lost upon DSS updates.

error_log stderr;
pid "/home/dataiku/dss/run/nginx/nginx.pid";
daemon off;
working_directory "/home/dataiku/dss/run/nginx";

events {
    worker_connections 10000;
}

http {
    # make these variables have a default value, they're used in some dynamically added locations
    map $auth_studiourl $auth_studiourl {}
    map $auth_accessforbiddenreason $auth_accessforbiddenreason {}

    gzip on;
    gzip_types text/javascript application/json text/css image/svg+xml;
    client_max_body_size 0;
    large_client_header_buffers 8 256K;
    server_tokens off;

    types {
        text/html       html htm shtml;
        text/css        css;
        text/javascript js;
        text/css        less;
        audio/mpeg      mp3;
        image/svg+xml   svg;
        application/pdf pdf;
        application/json json;
    }
    # define the format so to never expose remote_user which may contains API keys
    log_format anonymous '$remote_addr - - [$time_local] ' '"$request" $status $body_bytes_sent ' '"$http_referer" "$http_user_agent"';
    
    access_log "/home/dataiku/dss/run/nginx/access.log" anonymous;
    client_body_temp_path "/home/dataiku/dss/run/nginx";
    proxy_temp_path "/home/dataiku/dss/run/nginx";
    # Define these even if we don't use them to avoid permission issues
    fastcgi_temp_path "/home/dataiku/dss/run/nginx";
    scgi_temp_path "/home/dataiku/dss/run/nginx";
    uwsgi_temp_path "/home/dataiku/dss/run/nginx";

    proxy_http_version 1.1;
    proxy_next_upstream off; # Don't retry
    proxy_read_timeout 3600; # We have long queries
    proxy_set_header Host $http_host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header x-dss-nginx-client-ip $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_pass_header X-Accel-Buffering;

    server {
        listen 10000;

        root "/home/dataiku/dataiku-dss-14.4.0/frontend";

        include "/home/dataiku/dss/install-support/python-backends.d/*.conf"; #legacy location
        include "/home/dataiku/dss/install-support/backends.d/*/*.conf";

        

        location ^~ /dip/api/webapps/view {
            # header used for standard webapp redirection after login
            proxy_set_header "X-DKU-Redirect-To" "$request_uri";
            proxy_set_header Host $http_host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header x-dss-nginx-client-ip $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://127.0.0.1:10001/dip/api/webapps/view;
            
            
        }
        location ^~ /dip/ {
            proxy_pass http://127.0.0.1:10001/dip/;
            
            
        }
        location ^~ /public/packages/ {
            alias "/home/dataiku/dataiku-dss-14.4.0/public/packages/";
        }
        location /public/packages/dataiku-scoring-libs.jar {
            proxy_pass http://127.0.0.1:10001/dip/publicapi/resources/scoring-lib-jar/;
        }
        location ^~ /public/api/ {
            proxy_pass http://127.0.0.1:10001/dip/publicapi/;
        }
        location ^~ /jupyter/ {
            proxy_pass http://127.0.0.1:10002/jupyter/;
            proxy_redirect off;
            proxy_read_timeout 600;
            proxy_send_timeout 600;
        }

        

        location ~ ^/plugins/([^/]+)/resource/(.*)$ {
            root /;
            try_files /home/dataiku/dss/plugins/installed/$1/resource/$2 /home/dataiku/dss/plugins/dev/$1/resource/$2
            
            add_header Cache-Control private;
            expires 0;
            location ~ ^/plugins/([^/]+)/resource/(.*\.(html|css|js))$ {
                try_files /home/dataiku/dss/plugins/installed/$1/resource/$2 /home/dataiku/dss/plugins/dev/$1/resource/$2
                
                add_header Cache-Control private;
                expires -1;    # Equivalent to cache-control: no-cache
            }
        }

        
        location = /local/projects/auth {
            proxy_pass http://127.0.0.1:10001/dip/api/projects/$dku_project_key/check-access;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Sec-WebSocket-Protocol "";
            proxy_set_header X-Original-URI $request_uri;
        }

        location @error_location_local_project_static {
            try_files /local-projects-static-error-401.html /local-projects-static-error-401.html;
            sub_filter "http://localhost:10000" $auth_studiourl;
            sub_filter_once on;
        }
        location @reject_location_local_project_static {
            try_files /local-projects-static-error-403.html /local-projects-static-error-403.html;
            sub_filter "http://localhost:10000" $auth_studiourl;
            sub_filter "ERROR_MESSAGE_PLACEHOLDER" $auth_accessforbiddenreason;
            sub_filter_once on;
        }

        location ~ ^/local/projects/([^/]+)/static/(.*)$ {
            alias "/home/dataiku/dss/config/projects/$1/lib/static/$2";
            
            add_header Cache-Control private;
            expires -1;    # Equivalent to cache-control: no-cache
            set $dku_project_key $1; # because you can't have variables in the auth_request directive
            auth_request "/local/projects/auth";
            auth_request_set $auth_studiourl $upstream_http_x_dku_studiourl;
            auth_request_set $auth_accessforbiddenreason $upstream_http_x_dku_accessforbiddenreason;
            error_page 502 /local-projects-static-error-502.html;
            error_page 401 @error_location_local_project_static;
            error_page 403 @reject_location_local_project_static;
        }

        location ~ ^/local/projects/([^/]+)/resources/(.*)$ {
            alias "/home/dataiku/dss/lib/projects/$1/static/$2";
            
            add_header Cache-Control private;
            expires -1;    # Equivalent to cache-control: no-cache
            set $dku_project_key $1; # because you can't have variables in the auth_request directive
            auth_request "/local/projects/auth";
            auth_request_set $auth_studiourl $upstream_http_x_dku_studiourl;
            auth_request_set $auth_accessforbiddenreason $upstream_http_x_dku_accessforbiddenreason;
            error_page 502 /local-projects-static-error-502.html;
            error_page 401 @error_location_local_project_static;
            error_page 403 @reject_location_local_project_static;
        }

        location ~ ^/local/projects/([^/]+)/public-resources/(.*)$ {
            alias "/home/dataiku/dss/lib/projects/$1/local-static/$2";
        }


        
        location ^~ /stories/ {
            proxy_pass http://127.0.0.1:10006/stories/;
        }


        location / {
            rewrite ^/(home|profile|project-list|projects|workspaces|wikis|login|logged-out|sso-error|sso|admin|apps|docportal|business-app|business-apps|business-apps-explore|plugins-explore|plugins|libedition|feature-store|search-dss-items|data-lineage|data-catalog|catalog|inbox|automation|deployer|api-deployer|project-deployer|unified-monitoring|alation-open|external-table|meanings|licensing|data-quality|enterprise-asset-library|oauth2-callback).*$ /index.html break;
            index index.html;
            add_header Cache-Control "private, no-cache, max-age=0";
            expires 0;
            
                  add_header "Permissions-Policy" "fullscreen=*";

            location ~ ^/themes/builtin/([^/]+)/(.*)$ {
                alias "/home/dataiku/dataiku-dss-14.4.0/resources/themes/$1/$2";
            }
            location ~ ^/themes/user/([^/]+)/(.*)$ {
                alias "/home/dataiku/dss/resources/themes/$1/$2";
            }
        }

        ##### Long term caching: Angular chunks

        # Angular chunks are content-hashed. We don't need to check the hash here, it is safe to always serve with long-term caching
        location ~ ^/ngxdist/((?:chunk|main)-[0-9a-zA-Z-_]+\.js)$ {
            
                  add_header "Permissions-Policy" "fullscreen=*";

            add_header Cache-Control 'public, max-age=31536000, immutable';
            default_type application/javascript;
            alias "/home/dataiku/dataiku-dss-14.4.0/frontend/ngxdist/$1";
        }

        ##### Long term caching: Angular main files
        ##### (these rule could theoretically be merged with AngularJS, but it would break the ugly sed hacks in /dev/nginx)

        # Angular main files can be aliased (myfile.js -> myfile.hashed.XXX.js) for long-term caching
        # First, match against the expected hash to serve with long-term caching
        location ~ ^/ngxdist/(.+\.)hashed\.8686bce371e8\.(html|css|js|json|svg|jpg|png|ico|woff|woff2)$ {
            
                  add_header "Permissions-Policy" "fullscreen=*";

            add_header Cache-Control 'public, max-age=31536000, immutable';
            alias "/home/dataiku/dataiku-dss-14.4.0/frontend/ngxdist/$1$2";
        }
        # Fallback without long term caching if hash is wrong (can happen transiently during a DSS update) [sc-286474]
        location ~ ^/ngxdist/(.+\.)hashed\.[0-9a-zA-Z-_]+\.(html|css|js|json|svg|jpg|png|ico|woff|woff2)$ {
            
                  add_header "Permissions-Policy" "fullscreen=*";

            add_header Cache-Control "private, no-cache, max-age=0";
            expires -1;    # Equivalent to cache-control: no-cache
            alias "/home/dataiku/dataiku-dss-14.4.0/frontend/ngxdist/$1$2";
        }

        # Unhashed files always served without long-term caching
        location ~ ^/ngxdist/(.*)$ {
            
                  add_header "Permissions-Policy" "fullscreen=*";

            add_header Cache-Control "private, no-cache, max-age=0";
            expires -1;    # Equivalent to cache-control: no-cache
            alias "/home/dataiku/dataiku-dss-14.4.0/frontend/ngxdist/$1";
        }

        ##### Long term caching: AngularJS code & templates

        # AngularJS code & templates can be aliased (myfile.js -> myfile.hashed.XXX.js) for long-term caching
        # This could theoretically be merged with the previous set of "Angular main files" rules... but it would break the ugly sed hacks in /dev/nginx
        # First, match against the expected hash to serve with long-term caching
        location ~ ^[/]((?:|(?:static|bower_components|templates|html_app)[/](?:.*[/])?)[^/]+\.)hashed\.8686bce371e8\.(html|css|js|json|svg|jpg|png|ico|woff|woff2)$ {
            
                  add_header "Permissions-Policy" "fullscreen=*";

            add_header Cache-Control 'public, max-age=31536000, immutable';
            alias "/home/dataiku/dataiku-dss-14.4.0/frontend/$1$2";
        }
        # Fallback without long term caching if hash is wrong (can happen transiently during a DSS update) [sc-286474]
        location ~ ^[/]((?:|(?:static|bower_components|templates|html_app)[/](?:.*[/])?)[^/]+\.)hashed\.[0-9a-zA-Z-_]+\.(html|css|js|json|svg|jpg|png|ico|woff|woff2)$ {
            
                  add_header "Permissions-Policy" "fullscreen=*";

            add_header Cache-Control "private, no-cache, max-age=0";
            expires -1;    # Equivalent to cache-control: no-cache
            alias "/home/dataiku/dataiku-dss-14.4.0/frontend/$1$2";
        }

        location ~ ^/.*\.(html|css|js)$ {
            rewrite ^/(home|profile|project-list|projects|workspaces|wikis|login|logged-out|sso-error|sso|admin|apps|docportal|business-app|business-apps|business-apps-explore|plugins-explore|plugins|libedition|feature-store|search-dss-items|data-lineage|data-catalog|inbox|automation|deployer|api-deployer|project-deployer|unified-monitoring|alation-open|external-table|meanings|licensing|data-quality|enterprise-asset-library|oauth2-callback).*$ /index.html break;
            index index.html;
            
                  add_header "Permissions-Policy" "fullscreen=*";

            add_header Cache-Control "private, no-cache, max-age=0";
            expires -1;    # Equivalent to cache-control: no-cache
        }
        location ^~ /local/static/ {
            alias "/home/dataiku/dss/local/static/";
        }
    }
}

